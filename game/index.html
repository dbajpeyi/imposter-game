<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Imposter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#000000;
    --surface:#0e0e0e;
    --surface2:#161616;
    --line:#262626;
    --text:#f5f5f5;
    --muted:#8c8c8c;
    --yellow:#FCC723;
    --red:#e5443b;
    --radius:16px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);}
  body{
    font-family:"Space Grotesk",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    min-height:100vh;min-height:100dvh;
    -webkit-font-smoothing:antialiased;
  }
  #app{
    max-width:520px;margin:0 auto;
    min-height:100vh;min-height:100dvh;
    padding:max(20px,env(safe-area-inset-top)) 20px max(20px,env(safe-area-inset-bottom));
    display:flex;flex-direction:column;
  }
  .screen{flex:1;display:flex;flex-direction:column;animation:fade .25s ease;}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  @media (prefers-reduced-motion:reduce){.screen{animation:none}.card{transition:none!important}}

  .brand{font-weight:700;font-size:13px;letter-spacing:.32em;text-transform:uppercase;color:var(--yellow);text-align:center;}
  .title{font-weight:700;font-size:clamp(40px,13vw,60px);line-height:.95;letter-spacing:-.02em;text-align:center;margin:6px 0 0;}
  .title .dot{color:var(--yellow);}
  .sub{text-align:center;color:var(--muted);font-size:14px;margin-top:10px;}

  .stack{display:flex;flex-direction:column;gap:14px;}
  .grow{flex:1;}
  .center{display:flex;flex-direction:column;align-items:center;justify-content:center;}

  label.fld{display:block;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin:0 0 8px 2px;font-weight:600;}

  .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px;}

  .stepper{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:8px;}
  .stepper .val{font-weight:700;font-size:22px;min-width:40px;text-align:center;}
  .round-btn{width:46px;height:46px;border-radius:12px;border:none;background:var(--surface2);color:var(--text);font-size:24px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .round-btn:active{background:#222;}
  .round-btn:disabled{opacity:.3;}

  .names{display:flex;flex-direction:column;gap:8px;}
  .name-row{display:flex;align-items:center;gap:10px;}
  .name-row .idx{width:22px;text-align:center;color:var(--muted);font-size:13px;font-weight:600;flex:none;}
  input.name{
    flex:1;background:var(--surface);border:1px solid var(--line);border-radius:12px;
    padding:13px 14px;color:var(--text);font-size:16px;font-family:inherit;outline:none;
  }
  input.name:focus{border-color:var(--yellow);}

  select.sel{
    width:100%;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    padding:15px 14px;color:var(--text);font-size:16px;font-family:inherit;outline:none;
    -webkit-appearance:none;appearance:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path d='M1 1l5 5 5-5' stroke='%23FCC723' stroke-width='2' fill='none' stroke-linecap='round'/></svg>");
    background-repeat:no-repeat;background-position:right 16px center;
  }
  select.sel:focus{border-color:var(--yellow);}

  .seg{display:flex;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:4px;gap:4px;}
  .seg button{flex:1;border:none;background:transparent;color:var(--muted);font-family:inherit;font-size:14px;font-weight:600;padding:11px 6px;border-radius:10px;cursor:pointer;}
  .seg button.on{background:var(--yellow);color:#000;}

  .row{display:flex;align-items:center;justify-content:space-between;gap:14px;}
  .setting{padding:15px 0;border-bottom:1px solid var(--line);}
  .setting:last-child{border-bottom:none;}
  .setting .lbl{font-weight:600;font-size:15px;}
  .setting .hint{color:var(--muted);font-size:12.5px;margin-top:3px;max-width:55%;}

  .btn{
    width:100%;border:none;border-radius:var(--radius);padding:17px;font-family:inherit;
    font-size:17px;font-weight:700;cursor:pointer;letter-spacing:.01em;
  }
  .btn-primary{background:var(--yellow);color:#000;}
  .btn-primary:active{filter:brightness(.92);}
  .btn-ghost{background:transparent;color:var(--text);border:1px solid var(--line);}
  .btn-ghost:active{background:var(--surface);}
  .btn-row{display:flex;gap:10px;}
  .btn-row .btn{flex:1;}
  .link{background:none;border:none;color:var(--muted);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;padding:10px;text-decoration:underline;text-underline-offset:3px;}

  /* ----- reveal ----- */
  .reveal{flex:1;display:flex;flex-direction:column;}
  .reveal-top{height:48px;display:flex;align-items:center;justify-content:center;}
  .cat-label{font-size:13px;letter-spacing:.26em;text-transform:uppercase;color:var(--yellow);font-weight:700;text-align:center;}
  .card-wrap{flex:1;perspective:1400px;display:flex;}
  .card{
    position:relative;flex:1;border-radius:24px;cursor:pointer;
    transform-style:preserve-3d;transition:transform .5s cubic-bezier(.2,.7,.2,1);
  }
  .card.flipped{transform:rotateY(180deg);}
  .face{
    position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
    border-radius:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:24px;text-align:center;
  }
  .face-front{background:var(--surface);border:1px solid var(--line);}
  .face-front .who{font-size:13px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);font-weight:600;}
  .face-front .pname{font-weight:700;font-size:clamp(30px,9vw,42px);margin:8px 0 26px;line-height:1;}
  .tap-pill{border:2px solid var(--yellow);color:var(--yellow);border-radius:999px;padding:13px 26px;font-weight:700;font-size:15px;letter-spacing:.04em;}
  .face-back{background:var(--surface2);border:1px solid var(--line);transform:rotateY(180deg);}
  .face-back.imp{border-color:var(--red);}
  .card-cat{
    font-size:13px;letter-spacing:.24em;text-transform:uppercase;color:var(--yellow);
    font-weight:700;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--line);
    max-width:80%;
  }
  .face-back.imp .card-cat{border-bottom-color:rgba(229,68,59,.35);}
  .word{font-weight:700;font-size:clamp(34px,11vw,58px);line-height:1.02;letter-spacing:-.01em;word-break:break-word;}
  .imp-tag{font-weight:700;font-size:clamp(36px,12vw,60px);color:var(--red);letter-spacing:.02em;line-height:1;}
  .clue{margin-top:18px;}
  .clue .clue-k{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);font-weight:600;}
  .clue .clue-v{font-weight:700;font-size:clamp(26px,8vw,38px);margin-top:4px;word-break:break-word;}

  /* ----- started / roster ----- */
  .starter-box{text-align:center;padding:8px 0 4px;}
  .starter-k{font-size:13px;letter-spacing:.26em;text-transform:uppercase;color:var(--muted);font-weight:600;}
  .starter-v{font-weight:700;font-size:clamp(36px,12vw,56px);color:var(--yellow);line-height:1.02;margin-top:6px;word-break:break-word;}

  .roster{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;margin-top:6px;}
  .chip{background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:11px 16px;font-weight:600;font-size:15px;color:var(--text);cursor:pointer;}
  .chip:active{border-color:var(--yellow);}

  .answer-box{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px;text-align:center;}
  .answer-box .ak{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);font-weight:600;}
  .answer-box .aw{font-weight:700;font-size:clamp(26px,8vw,36px);margin-top:4px;}
  .answer-box .imps{margin-top:12px;color:var(--red);font-weight:600;font-size:15px;}

  .hide-on-share{}
</style>
</head>

/* ---------- constants ---------- */
const RANDOM = "__random__";
const MIN_PLAYERS = 3, MAX_PLAYERS = 10;
const DEFAULT_NAMES = ["Kovago","Kovacs","Ben","Deep"];
const CAT_NAMES = Object.keys(CATEGORIES || {});

/* ---------- persistence (safe) ---------- */
const LS = {
  get(k,d){ try{ const v=localStorage.getItem(k); return v==null?d:JSON.parse(v);}catch(e){ return d; } },
  set(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }
};
const SAVED = LS.get("imposter.settings", {});

/* ---------- state ---------- */
const S = {
  names:        Array.isArray(SAVED.names) && SAVED.names.length ? SAVED.names.slice() : DEFAULT_NAMES.slice(),
  playerCount:  clampInt(SAVED.playerCount, MIN_PLAYERS, MAX_PLAYERS, 4),
  imposterMode: SAVED.imposterMode === "random" ? "random" : "fixed",
  imposterCount:clampInt(SAVED.imposterCount, 1, MAX_PLAYERS-1, 1),
  showCategory: SAVED.showCategory !== undefined ? !!SAVED.showCategory : true,
  hardMode:     !!SAVED.hardMode,
  category:     (SAVED.category && (SAVED.category===RANDOM || CATEGORIES[SAVED.category])) ? SAVED.category : RANDOM,
};
const R = { word:"", hint:"", catName:"", roles:[], starter:0, impCount:1 };
const F = { screen:"setup", idx:0, flipped:false, mode:"deal", answerShown:false };
let lastWordKey = "";

function clampInt(v,min,max,def){ v=parseInt(v,10); if(isNaN(v))return def; return Math.max(min,Math.min(max,v)); }
function ensureNames(){
  for(let i=S.names.length;i<S.playerCount;i++) S.names[i] = "Player "+(i+1);
}
function nameOf(i){ const n=(S.names[i]||"").trim(); return n || ("Player "+(i+1)); }
function save(){
  S.imposterCount = Math.min(S.imposterCount, S.playerCount-1);
  LS.set("imposter.settings", S);
}
function rnd(n){ return Math.floor(Math.random()*n); }

/* ---------- round logic ---------- */
function startRound(){
  ensureNames();
  // pick category
  R.catName = (S.category===RANDOM) ? CAT_NAMES[rnd(CAT_NAMES.length)] : S.category;
  // pick word, avoid immediate repeat
  const list = CATEGORIES[R.catName];
  let pick;
  for(let t=0;t<8;t++){ pick = list[rnd(list.length)]; if(R.catName+"|"+pick.w !== lastWordKey) break; }
  lastWordKey = R.catName+"|"+pick.w;
  R.word = pick.w; R.hint = pick.h;
  // imposters
  const maxRand = Math.max(1, Math.ceil(S.playerCount/3));
  R.impCount = (S.imposterMode==="random") ? (1+rnd(maxRand)) : Math.min(S.imposterCount, S.playerCount-1);
  // assign roles
  R.roles = new Array(S.playerCount).fill("crew");
  let assigned=0;
  while(assigned<R.impCount){ const k=rnd(S.playerCount); if(R.roles[k]==="crew"){R.roles[k]="imp";assigned++;} }
  // who starts
  R.starter = rnd(S.playerCount);
  // flow
  F.idx=0; F.flipped=false; F.mode="deal"; F.answerShown=false;
  go("reveal");
}

/* ---------- router ---------- */
function go(screen){ F.screen=screen; render(); }
function render(){
  const app=document.getElementById("app");
  app.innerHTML="";
  let el;
  if(F.screen==="setup") el=renderSetup();
  else if(F.screen==="settings") el=renderSettings();
  else if(F.screen==="reveal") el=renderReveal();
  else if(F.screen==="started") el=renderStarted();
  app.appendChild(el);
}

/* ---------- SETUP ---------- */
function renderSetup(){
  ensureNames();
  const s=document.createElement("div"); s.className="screen stack";

  const head=document.createElement("div");
  head.innerHTML='<div class="brand">Pass &amp; play</div><div class="title">IMPOSTER<span class="dot">.</span></div>';
  s.appendChild(head);

  const gap=document.createElement("div"); gap.style.height="6px"; s.appendChild(gap);

  // players stepper
  const pc=document.createElement("div");
  const lab=document.createElement("label"); lab.className="fld"; lab.textContent="Players"; pc.appendChild(lab);
  const step=document.createElement("div"); step.className="stepper";
  const minus=document.createElement("button"); minus.className="round-btn"; minus.textContent="–"; minus.disabled=S.playerCount<=MIN_PLAYERS;
  const val=document.createElement("div"); val.className="val"; val.textContent=S.playerCount;
  const plus=document.createElement("button"); plus.className="round-btn"; plus.textContent="+"; plus.disabled=S.playerCount>=MAX_PLAYERS;
  minus.onclick=()=>{ if(S.playerCount>MIN_PLAYERS){S.playerCount--;save();render();} };
  plus.onclick =()=>{ if(S.playerCount<MAX_PLAYERS){S.playerCount++;ensureNames();save();render();} };
  step.appendChild(minus); step.appendChild(val); step.appendChild(plus);
  pc.appendChild(step); s.appendChild(pc);

  // names
  const nm=document.createElement("div");
  const nlab=document.createElement("label"); nlab.className="fld"; nlab.textContent="Names"; nm.appendChild(nlab);
  const names=document.createElement("div"); names.className="names";
  for(let i=0;i<S.playerCount;i++){
    const row=document.createElement("div"); row.className="name-row";
    const idx=document.createElement("div"); idx.className="idx"; idx.textContent=(i+1);
    const inp=document.createElement("input"); inp.className="name"; inp.type="text"; inp.value=S.names[i]||"";
    inp.placeholder="Player "+(i+1); inp.maxLength=14;
    inp.oninput=(e)=>{ S.names[i]=e.target.value; };
    inp.onblur=()=>{ save(); };
    row.appendChild(idx); row.appendChild(inp); names.appendChild(row);
  }
  nm.appendChild(names); s.appendChild(nm);

  // category
  const cc=document.createElement("div");
  const clab=document.createElement("label"); clab.className="fld"; clab.textContent="Category"; cc.appendChild(clab);
  const sel=document.createElement("select"); sel.className="sel";
  const opt0=document.createElement("option"); opt0.value=RANDOM; opt0.textContent="🎲  Surprise me"; sel.appendChild(opt0);
  CAT_NAMES.forEach(c=>{ const o=document.createElement("option"); o.value=c; o.textContent=c; sel.appendChild(o); });
  sel.value=S.category;
  sel.onchange=(e)=>{ S.category=e.target.value; save(); };
  cc.appendChild(sel); s.appendChild(cc);

  s.appendChild(document.createElement("div")).className="grow";

  const btns=document.createElement("div"); btns.className="btn-row";
  const setBtn=document.createElement("button"); setBtn.className="btn btn-ghost"; setBtn.textContent="Settings"; setBtn.onclick=()=>go("settings");
  const startBtn=document.createElement("button"); startBtn.className="btn btn-primary"; startBtn.textContent="Start"; startBtn.onclick=startRound;
  btns.appendChild(setBtn); btns.appendChild(startBtn);
  s.appendChild(btns);
  return s;
}

/* ---------- SETTINGS ---------- */
function renderSettings(){
  const s=document.createElement("div"); s.className="screen stack";
  const head=document.createElement("div"); head.innerHTML='<div class="brand">Game</div><div class="title" style="font-size:clamp(32px,10vw,44px)">Settings</div>';
  s.appendChild(head);
  const gap=document.createElement("div"); gap.style.height="6px"; s.appendChild(gap);

  const panel=document.createElement("div"); panel.className="panel";

  // imposters mode
  const imp=document.createElement("div"); imp.className="setting";
  const impTop=document.createElement("div"); impTop.className="row";
  impTop.innerHTML='<div><div class="lbl">Imposters</div><div class="hint">Fixed count, or a hidden random number each round.</div></div>';
  const seg=document.createElement("div"); seg.className="seg"; seg.style.flex="none"; seg.style.width="170px";
  const bFix=document.createElement("button"); bFix.textContent="Fixed"; bFix.className=S.imposterMode==="fixed"?"on":"";
  const bRnd=document.createElement("button"); bRnd.textContent="Random"; bRnd.className=S.imposterMode==="random"?"on":"";
  bFix.onclick=()=>{ S.imposterMode="fixed"; save(); render(); };
  bRnd.onclick=()=>{ S.imposterMode="random"; save(); render(); };
  seg.appendChild(bFix); seg.appendChild(bRnd);
  impTop.appendChild(seg); imp.appendChild(impTop);

  if(S.imposterMode==="fixed"){
    const cnt=document.createElement("div"); cnt.style.marginTop="12px";
    const step=document.createElement("div"); step.className="stepper";
    const maxImp=S.playerCount-1;
    S.imposterCount=Math.min(S.imposterCount,maxImp);
    const m=document.createElement("button"); m.className="round-btn"; m.textContent="–"; m.disabled=S.imposterCount<=1;
    const v=document.createElement("div"); v.className="val"; v.textContent=S.imposterCount;
    const p=document.createElement("button"); p.className="round-btn"; p.textContent="+"; p.disabled=S.imposterCount>=maxImp;
    m.onclick=()=>{ if(S.imposterCount>1){S.imposterCount--;save();render();} };
    p.onclick=()=>{ if(S.imposterCount<maxImp){S.imposterCount++;save();render();} };
    step.appendChild(m); step.appendChild(v); step.appendChild(p);
    cnt.appendChild(step); imp.appendChild(cnt);
  }
  panel.appendChild(imp);

  // show category
  panel.appendChild(toggleSetting(
    "Show category","Display the category to everyone on the reveal.",
    S.showCategory,(v)=>{S.showCategory=v;save();render();}, "Shown","Hidden"
  ));

  // clue difficulty
  panel.appendChild(toggleSetting(
    "Clue difficulty","Hard = the imposter gets no hint word at all.",
    S.hardMode,(v)=>{S.hardMode=v;save();render();}, "Hard","Normal", true
  ));

  s.appendChild(panel);
  s.appendChild(document.createElement("div")).className="grow";

  const done=document.createElement("button"); done.className="btn btn-primary"; done.textContent="Done"; done.onclick=()=>go("setup");
  s.appendChild(done);
  return s;
}
function toggleSetting(title,hint,val,onChange,onLabel,offLabel,onIsRight){
  const wrap=document.createElement("div"); wrap.className="setting";
  const row=document.createElement("div"); row.className="row";
  row.innerHTML='<div><div class="lbl">'+title+'</div><div class="hint">'+hint+'</div></div>';
  const seg=document.createElement("div"); seg.className="seg"; seg.style.flex="none"; seg.style.width="170px";
  // left = off, right = on
  const left=document.createElement("button"); left.textContent=offLabel; left.className=!val?"on":"";
  const right=document.createElement("button"); right.textContent=onLabel; right.className=val?"on":"";
  left.onclick=()=>onChange(false);
  right.onclick=()=>onChange(true);
  seg.appendChild(left); seg.appendChild(right);
  row.appendChild(seg); wrap.appendChild(row);
  return wrap;
}

/* ---------- REVEAL ---------- */
function renderReveal(){
  const i=F.idx;
  const role=R.roles[i];
  const isImp=role==="imp";
  const s=document.createElement("div"); s.className="screen reveal";

  // small top spacer (category now lives on the card, next to the word)
  const top=document.createElement("div"); top.className="reveal-top"; top.style.height="16px";
  s.appendChild(top);

  // card
  const wrap=document.createElement("div"); wrap.className="card-wrap";
  const card=document.createElement("div"); card.className="card"+(F.flipped?" flipped":"");

  const front=document.createElement("div"); front.className="face face-front";
  front.innerHTML='<div class="who">Pass to</div><div class="pname">'+escapeHtml(nameOf(i))+'</div><div class="tap-pill">TAP TO REVEAL</div>';

  const catHtml = S.showCategory ? '<div class="card-cat">'+escapeHtml(R.catName)+'</div>' : '';
  const back=document.createElement("div"); back.className="face face-back"+(isImp?" imp":"");
  if(isImp){
    let h=catHtml+'<div class="imp-tag">IMPOSTER</div>';
    if(!S.hardMode){ h+='<div class="clue"><div class="clue-k">Clue</div><div class="clue-v">'+escapeHtml(R.hint)+'</div></div>'; }
    back.innerHTML=h;
  }else{
    back.innerHTML=catHtml+'<div class="word">'+escapeHtml(R.word)+'</div>';
  }
  card.appendChild(front); card.appendChild(back);

  card.onclick=()=>{ if(!F.flipped){ F.flipped=true; render(); } };
  wrap.appendChild(card); s.appendChild(wrap);

  // bottom button
  const pad=document.createElement("div"); pad.style.height="14px"; s.appendChild(pad);
  const btn=document.createElement("button"); btn.className="btn btn-primary";
  if(!F.flipped){
    btn.className="btn btn-ghost"; btn.textContent=(F.mode==="peek")?"Cancel":"Skip";
    btn.onclick=()=>{ if(F.mode==="peek"){ go("started"); } else { advance(); } };
  }else{
    if(F.mode==="peek"){ btn.textContent="Hide & go back"; btn.onclick=()=>go("started"); }
    else if(i>=S.playerCount-1){ btn.textContent="Hide & start"; btn.onclick=()=>go("started"); }
    else { btn.textContent="Hide & pass"; btn.onclick=advance; }
  }
  s.appendChild(btn);
  return s;
}
function advance(){ F.idx++; F.flipped=false; if(F.idx>=S.playerCount){ go("started"); } else { render(); } }

/* ---------- STARTED ---------- */
function renderStarted(){
  const s=document.createElement("div"); s.className="screen stack";

  const sb=document.createElement("div"); sb.className="starter-box";
  sb.innerHTML='<div class="starter-k">Starts the round</div><div class="starter-v">'+escapeHtml(nameOf(R.starter))+'</div>';
  s.appendChild(sb);

  const hint=document.createElement("div"); hint.className="sub"; hint.style.marginTop="0";
  hint.textContent="Forgot yours? Tap your name to peek.";
  s.appendChild(hint);

  const roster=document.createElement("div"); roster.className="roster";
  for(let i=0;i<S.playerCount;i++){
    const chip=document.createElement("button"); chip.className="chip"; chip.textContent=nameOf(i);
    chip.onclick=()=>{ F.mode="peek"; F.idx=i; F.flipped=false; go("reveal"); };
    roster.appendChild(chip);
  }
  s.appendChild(roster);

  s.appendChild(document.createElement("div")).className="grow";

  if(F.answerShown){
    const box=document.createElement("div"); box.className="answer-box";
    const impNames=R.roles.map((r,i)=>r==="imp"?nameOf(i):null).filter(Boolean);
    box.innerHTML='<div class="ak">'+escapeHtml(R.catName)+'</div><div class="aw">'+escapeHtml(R.word)+'</div>'+
      '<div class="imps">'+(impNames.length>1?"Imposters: ":"Imposter: ")+impNames.map(escapeHtml).join(", ")+'</div>';
    s.appendChild(box);
    const pad=document.createElement("div"); pad.style.height="12px"; s.appendChild(pad);
  }else{
    const rev=document.createElement("button"); rev.className="btn btn-ghost"; rev.textContent="Reveal answer";
    rev.onclick=()=>{ F.answerShown=true; render(); };
    s.appendChild(rev);
    const pad=document.createElement("div"); pad.style.height="10px"; s.appendChild(pad);
  }

  const btns=document.createElement("div"); btns.className="btn-row";
  const ng=document.createElement("button"); ng.className="btn btn-ghost"; ng.textContent="New game"; ng.onclick=()=>go("setup");
  const nr=document.createElement("button"); nr.className="btn btn-primary"; nr.textContent="Next round"; nr.onclick=startRound;
  btns.appendChild(ng); btns.appendChild(nr);
  s.appendChild(btns);
  return s;
}
