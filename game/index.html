<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Imposter — Pass the Phone</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#12141c;
    --ink-2:#1a1d29;
    --ink-3:#232838;
    --line:#333a52;
    --paper:#ece7da;
    --muted:#8b91a6;
    --gold:#e0a93b;
    --gold-deep:#a87a1f;
    --crimson:#e0564e;
    --crimson-deep:#a02f2a;
    --redact:#0c0d12;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(120% 80% at 50% -10%, #1d2233 0%, var(--ink) 60%) fixed,
      var(--ink);
    color:var(--paper);
    font-family:"Inter",system-ui,sans-serif;
    min-height:100vh;
    line-height:1.5;
  }
  /* faint grid, like a file folder */
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;opacity:.05;
    background-image:linear-gradient(var(--paper) 1px,transparent 1px),
                     linear-gradient(90deg,var(--paper) 1px,transparent 1px);
    background-size:26px 26px;
  }
  #app{
    position:relative;
    max-width:460px;margin:0 auto;
    min-height:100vh;
    padding:26px 20px 40px;
    display:flex;flex-direction:column;
  }

  .eyebrow{
    font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.28em;
    text-transform:uppercase;color:var(--muted);margin:0;
  }
  .display{font-family:"Anton",sans-serif;font-weight:400;letter-spacing:.02em;line-height:.96;}
  .hr{height:1px;background:var(--line);border:0;margin:0;}

  /* ---------- masthead ---------- */
  .masthead{margin-bottom:22px;}
  .masthead .tag{
    display:flex;justify-content:space-between;align-items:flex-end;
    border-bottom:1px solid var(--line);padding-bottom:8px;
  }
  .masthead h1{
    font-family:"Anton",sans-serif;font-size:54px;margin:6px 0 0;
    text-transform:uppercase;letter-spacing:.04em;
  }
  .masthead h1 .o{color:var(--crimson);}
  .stamp-file{
    font-family:"Space Mono",monospace;font-size:11px;color:var(--gold);
    border:1px solid var(--gold-deep);border-radius:3px;padding:3px 7px;letter-spacing:.12em;
  }

  /* ---------- generic blocks ---------- */
  .panel{
    background:var(--ink-2);border:1px solid var(--line);border-radius:10px;
    padding:16px;margin-bottom:14px;
  }
  .panel > .label{margin-bottom:12px;}
  label.label{display:block;}

  .name-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .name-row:last-child{margin-bottom:0;}
  .name-num{
    font-family:"Space Mono",monospace;font-size:11px;color:var(--muted);
    width:34px;flex:none;letter-spacing:.1em;
  }
  input[type=text]{
    flex:1;width:100%;background:var(--ink-3);border:1px solid var(--line);
    color:var(--paper);font-family:"Inter",sans-serif;font-size:16px;font-weight:500;
    padding:11px 12px;border-radius:7px;outline:none;
  }
  input[type=text]:focus-visible{border-color:var(--gold);box-shadow:0 0 0 2px rgba(224,169,59,.25);}

  .seg{display:flex;gap:8px;}
  .seg button{
    flex:1;background:var(--ink-3);border:1px solid var(--line);color:var(--paper);
    font-family:"Space Mono",monospace;font-weight:700;font-size:17px;
    padding:13px 0;border-radius:7px;cursor:pointer;transition:.15s;
  }
  .seg button .sub{display:block;font-size:9px;font-weight:400;letter-spacing:.14em;color:var(--muted);margin-top:3px;}
  .seg button[aria-pressed=true]{background:var(--gold);color:var(--ink);border-color:var(--gold);}
  .seg button[aria-pressed=true] .sub{color:rgba(18,20,28,.7);}
  .seg button:focus-visible{outline:2px solid var(--gold);outline-offset:2px;}

  select{
    width:100%;background:var(--ink-3);border:1px solid var(--line);color:var(--paper);
    font-family:"Inter",sans-serif;font-size:16px;font-weight:500;padding:12px;border-radius:7px;
    outline:none;appearance:none;
    background-image:linear-gradient(45deg,transparent 50%,var(--muted) 50%),linear-gradient(135deg,var(--muted) 50%,transparent 50%);
    background-position:calc(100% - 18px) 50%,calc(100% - 13px) 50%;
    background-size:5px 5px,5px 5px;background-repeat:no-repeat;
  }
  select:focus-visible{border-color:var(--gold);box-shadow:0 0 0 2px rgba(224,169,59,.25);}

  .btn{
    width:100%;border:0;border-radius:9px;cursor:pointer;
    font-family:"Anton",sans-serif;font-size:21px;letter-spacing:.06em;text-transform:uppercase;
    padding:16px;transition:.15s;
  }
  .btn-gold{background:var(--gold);color:var(--ink);}
  .btn-gold:hover{filter:brightness(1.06);}
  .btn-ghost{
    background:transparent;color:var(--paper);border:1px solid var(--line);
    font-family:"Space Mono",monospace;font-size:13px;letter-spacing:.12em;font-weight:700;padding:14px;
  }
  .btn-ghost:hover{border-color:var(--paper);}
  .btn:focus-visible{outline:2px solid var(--gold);outline-offset:3px;}
  .btn-row{display:flex;gap:10px;}
  .btn-row .btn{font-size:13px;}

  .note{font-size:13px;color:var(--muted);margin:8px 2px 0;}
  .error{color:var(--crimson);font-family:"Space Mono",monospace;font-size:12px;margin-top:10px;min-height:14px;}

  .spacer{flex:1;}

  /* ---------- handoff ---------- */
  .handoff-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
  .counter{font-family:"Space Mono",monospace;font-size:12px;letter-spacing:.18em;color:var(--muted);}
  .progress{display:flex;gap:6px;}
  .pip{width:22px;height:4px;border-radius:2px;background:var(--line);}
  .pip.done{background:var(--gold);}
  .pip.active{background:var(--paper);}

  .passto{text-align:center;margin:8px 0 4px;}
  .passto .eyebrow{margin-bottom:10px;}
  .passto .who{font-family:"Anton",sans-serif;font-size:42px;text-transform:uppercase;line-height:1;word-break:break-word;}

  /* ---------- the card / signature ---------- */
  .card{
    perspective:1400px;margin:22px 0;cursor:pointer;
  }
  .card-inner{
    position:relative;width:100%;min-height:380px;
    transform-style:preserve-3d;transition:transform .6s cubic-bezier(.2,.7,.2,1);
  }
  .card.flipped .card-inner{transform:rotateY(180deg);}
  .face{
    position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
    border-radius:14px;padding:24px;display:flex;flex-direction:column;
    border:1px solid var(--line);overflow:hidden;
  }
  /* front: sealed */
  .face-front{
    background:repeating-linear-gradient(135deg,var(--ink-2) 0 12px,var(--ink-3) 12px 24px);
    align-items:center;justify-content:center;text-align:center;gap:18px;
  }
  .seal{
    width:96px;height:96px;border-radius:50%;
    border:2px dashed var(--gold-deep);display:flex;align-items:center;justify-content:center;
    color:var(--gold);font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.12em;
    text-align:center;line-height:1.3;
  }
  .face-front .lead{font-family:"Anton",sans-serif;font-size:26px;text-transform:uppercase;letter-spacing:.05em;}
  .classified{
    position:absolute;top:14px;left:14px;font-family:"Space Mono",monospace;font-size:10px;
    letter-spacing:.2em;color:var(--crimson);border:1px solid var(--crimson-deep);padding:2px 6px;border-radius:3px;
  }
  .tap-hint{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.2em;color:var(--muted);}

  /* back: role */
  .face-back{transform:rotateY(180deg);justify-content:center;text-align:center;gap:14px;}
  .face-back.crew{background:linear-gradient(160deg,#241f10,#1a1d29);border-color:var(--gold-deep);}
  .face-back.imp{background:linear-gradient(160deg,#2a1413,#1a1d29);border-color:var(--crimson-deep);}
  .role-tag{
    font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;
    align-self:center;padding:4px 10px;border-radius:4px;
  }
  .crew .role-tag{color:var(--ink);background:var(--gold);}
  .imp .role-tag{color:var(--paper);background:var(--crimson-deep);}
  .role-headline{font-family:"Anton",sans-serif;font-size:24px;text-transform:uppercase;letter-spacing:.04em;}
  .imp .role-headline{color:var(--crimson);}
  .crew .word{
    font-family:"Anton",sans-serif;font-size:46px;line-height:1;color:var(--gold);
    text-transform:uppercase;word-break:break-word;margin:4px 0;
  }
  .crew .cat-line,.imp .cat-line{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.16em;color:var(--muted);text-transform:uppercase;}
  .hint-block{margin:6px auto 0;max-width:300px;}
  .hint-label{font-family:"Space Mono",monospace;font-size:10px;letter-spacing:.22em;color:var(--muted);margin-bottom:8px;}
  .redactions{display:flex;flex-direction:column;gap:7px;align-items:center;margin-bottom:12px;}
  .redactions span{height:11px;border-radius:2px;background:var(--redact);}
  .redactions span:nth-child(1){width:70%;}
  .redactions span:nth-child(2){width:90%;}
  .redactions span:nth-child(3){width:55%;}
  .hint-text{font-family:"Inter",sans-serif;font-size:24px;font-weight:600;color:var(--paper);}
  .role-foot{font-size:13px;color:var(--muted);max-width:300px;margin:2px auto 0;}

  /* ---------- discuss ---------- */
  .discuss-head{text-align:center;margin-bottom:6px;}
  .discuss-head .display{font-size:40px;text-transform:uppercase;}
  .instructions{margin:0 0 14px;font-size:14px;color:var(--muted);text-align:center;}

  .reveal-box{
    margin-top:6px;border:1px dashed var(--line);border-radius:10px;padding:16px;text-align:center;
  }
  .reveal-box .word{font-family:"Anton",sans-serif;font-size:36px;color:var(--gold);text-transform:uppercase;line-height:1;margin:4px 0;}
  .reveal-box .imps{font-family:"Space Mono",monospace;font-size:13px;color:var(--crimson);margin-top:8px;letter-spacing:.06em;}

  @media (prefers-reduced-motion:reduce){
    .card-inner{transition:none;}
  }
  @media (max-width:380px){
    .masthead h1{font-size:46px;}
    .crew .word{font-size:38px;}
    .passto .who{font-size:34px;}
  }
</style>
</head>

cle", "h": "leather"}, {"w": "Bicycle", "h": "pedal"}, {"w": "Train", "h": "tracks"}, {"w": "Airplane", "h": "wings"}, {"w": "Helicopter", "h": "rotor"}, {"w": "Boat", "h": "float"}, {"w": "Ship", "h": "sea"}, {"w": "Submarine", "h": "dive"}, {"w": "Rocket", "h": "launch"}, {"w": "Scooter", "h": "kick"}, {"w": "Tractor", "h": "farm"}, {"w": "Van", "h": "cargo"}, {"w": "Taxi", "h": "fare"}, {"w": "Ambulance", "h": "siren"}, {"w": "Fire Truck", "h": "ladder"}, {"w": "Police Car", "h": "chase"}, {"w": "Tank", "h": "armor"}, {"w": "Jet", "h": "fast"}, {"w": "Yacht", "h": "luxury"}, {"w": "Canoe", "h": "paddle"}, {"w": "Kayak", "h": "rapids"}, {"w": "Sailboat", "h": "mast"}, {"w": "Ferry", "h": "crossing"}, {"w": "Tram", "h": "rail"}, {"w": "Subway", "h": "underground"}, {"w": "Limousine", "h": "stretch"}, {"w": "Convertible", "h": "breeze"}, {"w": "SUV", "h": "family"}, {"w": "Pickup Truck", "h": "bed"}, {"w": "Forklift", "h": "pallet"}, {"w": "Bulldozer", "h": "push"}, {"w": "Crane", "h": "lift"}, {"w": "Excavator", "h": "dig"}, {"w": "Cement Mixer", "h": "spin"}, {"w": "Skateboard", "h": "deck"}, {"w": "Segway", "h": "balance"}, {"w": "Hot Air Balloon", "h": "drift"}, {"w": "Blimp", "h": "airship"}, {"w": "Glider", "h": "soar"}, {"w": "Jet Ski", "h": "spray"}, {"w": "Hovercraft", "h": "cushion"}, {"w": "Cable Car", "h": "mountain"}, {"w": "Monorail", "h": "single"}, {"w": "Spaceship", "h": "cosmos"}, {"w": "Snowmobile", "h": "snow"}, {"w": "Go-Kart", "h": "tiny"}, {"w": "Rickshaw", "h": "pull"}], "Clothing": [{"w": "T-Shirt", "h": "casual"}, {"w": "Jeans", "h": "denim"}, {"w": "Dress", "h": "twirl"}, {"w": "Skirt", "h": "pleat"}, {"w": "Jacket", "h": "zip"}, {"w": "Coat", "h": "winter"}, {"w": "Sweater", "h": "cozy"}, {"w": "Hoodie", "h": "hood"}, {"w": "Shorts", "h": "summer"}, {"w": "Socks", "h": "pair"}, {"w": "Shoes", "h": "laces"}, {"w": "Boots", "h": "tall"}, {"w": "Sneakers", "h": "athletic"}, {"w": "Sandals", "h": "strap"}, {"w": "Hat", "h": "head"}, {"w": "Cap", "h": "brim"}, {"w": "Scarf", "h": "wrap"}, {"w": "Gloves", "h": "fingers"}, {"w": "Belt", "h": "buckle"}, {"w": "Tie", "h": "knot"}, {"w": "Suit", "h": "formal"}, {"w": "Shirt", "h": "button"}, {"w": "Blouse", "h": "silky"}, {"w": "Trousers", "h": "legs"}, {"w": "Leggings", "h": "stretch"}, {"w": "Pajamas", "h": "sleep"}, {"w": "Underwear", "h": "hidden"}, {"w": "Bra", "h": "support"}, {"w": "Vest", "h": "sleeveless"}, {"w": "Cardigan", "h": "grandpa"}, {"w": "Blazer", "h": "smart"}, {"w": "Tuxedo", "h": "fancy"}, {"w": "Gown", "h": "ballroom"}, {"w": "Robe", "h": "lounge"}, {"w": "Swimsuit", "h": "pool"}, {"w": "Bikini", "h": "beach"}, {"w": "Raincoat", "h": "waterproof"}, {"w": "Poncho", "h": "cape"}, {"w": "Mittens", "h": "thumbs"}, {"w": "Beanie", "h": "knit"}, {"w": "Helmet", "h": "protect"}, {"w": "Apron", "h": "cooking"}, {"w": "Overalls", "h": "bib"}, {"w": "Jumpsuit", "h": "onesie"}, {"w": "Kimono", "h": "japan"}, {"w": "Sari", "h": "drape"}, {"w": "Kilt", "h": "scotland"}, {"w": "Slippers", "h": "comfy"}, {"w": "Heels", "h": "click"}, {"w": "Flip-Flops", "h": "flap"}], "Household Items": [{"w": "Sofa", "h": "lounge"}, {"w": "Chair", "h": "sit"}, {"w": "Table", "h": "flat"}, {"w": "Bed", "h": "sleep"}, {"w": "Lamp", "h": "glow"}, {"w": "Mirror", "h": "reflection"}, {"w": "Clock", "h": "tick"}, {"w": "Television", "h": "screen"}, {"w": "Refrigerator", "h": "cold"}, {"w": "Oven", "h": "bake"}, {"w": "Microwave", "h": "beep"}, {"w": "Toaster", "h": "pop"}, {"w": "Kettle", "h": "boil"}, {"w": "Blender", "h": "whir"}, {"w": "Fork", "h": "prongs"}, {"w": "Spoon", "h": "scoop"}, {"w": "Knife", "h": "sharp"}, {"w": "Plate", "h": "dish"}, {"w": "Cup", "h": "sip"}, {"w": "Bowl", "h": "round"}, {"w": "Pillow", "h": "fluff"}, {"w": "Blanket", "h": "warm"}, {"w": "Towel", "h": "dry"}, {"w": "Curtain", "h": "window"}, {"w": "Rug", "h": "floor"}, {"w": "Vacuum", "h": "suck"}, {"w": "Broom", "h": "sweep"}, {"w": "Mop", "h": "wet"}, {"w": "Bucket", "h": "pail"}, {"w": "Sink", "h": "faucet"}, {"w": "Toilet", "h": "flush"}, {"w": "Shower", "h": "rinse"}, {"w": "Bathtub", "h": "soak"}, {"w": "Dishwasher", "h": "dishes"}, {"w": "Washing Machine", "h": "spin"}, {"w": "Iron", "h": "press"}, {"w": "Hairdryer", "h": "blow"}, {"w": "Fan", "h": "breeze"}, {"w": "Heater", "h": "warmth"}, {"w": "Candle", "h": "flame"}, {"w": "Vase", "h": "flowers"}, {"w": "Wardrobe", "h": "closet"}, {"w": "Desk", "h": "work"}, {"w": "Bookshelf", "h": "books"}, {"w": "Drawer", "h": "slide"}, {"w": "Doorbell", "h": "ring"}, {"w": "Trash Can", "h": "bin"}, {"w": "Frying Pan", "h": "sizzle"}, {"w": "Scissors", "h": "snip"}, {"w": "Remote Control", "h": "channel"}]};
const RANDOM = "__random__";
const PLAYER_COUNT = 4;

const state = {
  screen: "setup",
  players: ["", "", "", ""],
  imposters: 1,
  category: RANDOM,
  // round
  word: "", hint: "", catName: "",
  impSet: new Set(),
  idx: 0,
  flipped: false,
  // results
  answerShown: false,
};

const app = document.getElementById("app");
const esc = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const rand = n => Math.floor(Math.random() * n);
const sample = arr => arr[rand(arr.length)];

function pickImposters(count){
  const idxs = [0,1,2,3];
  for(let i=idxs.length-1;i>0;i--){const j=rand(i+1);[idxs[i],idxs[j]]=[idxs[j],idxs[i]];}
  return new Set(idxs.slice(0,count));
}

function startRound(){
  state.catName = state.category===RANDOM ? sample(Object.keys(CATEGORIES)) : state.category;
  const entry = sample(CATEGORIES[state.catName]);
  state.word = entry.w; state.hint = entry.h;
  state.impSet = pickImposters(state.imposters);
  state.idx = 0; state.flipped = false;
  state.answerShown = false;
  state.screen = "handoff";
  render();
}

function playerName(i){ return state.players[i] || ("Player " + (i+1)); }

/* ---------------- SETUP ---------------- */
function renderSetup(){
  const opts = [`<option value="${RANDOM}">Surprise me</option>`]
    .concat(Object.keys(CATEGORIES).map(c=>`<option value="${esc(c)}"${state.category===c?" selected":""}>${esc(c)}</option>`))
    .join("");

  app.innerHTML = `
    <header class="masthead">
      <div class="tag">
        <span class="eyebrow">Social deduction · pass the phone</span>
        <span class="stamp-file">CASE&nbsp;#${String(rand(9000)+1000)}</span>
      </div>
      <h1>IMP<span class="o">O</span>STER</h1>
    </header>

    <div class="panel">
      <span class="label eyebrow">The four agents</span>
      ${[0,1,2,3].map(i=>`
        <div class="name-row">
          <span class="name-num">0${i+1}</span>
          <input type="text" id="p${i}" maxlength="14" placeholder="Player ${i+1}" value="${esc(state.players[i])}" autocomplete="off">
        </div>`).join("")}
    </div>

    <div class="panel">
      <span class="label eyebrow">How many imposters</span>
      <div class="seg" id="seg">
        ${[1,2,3].map(n=>`<button data-n="${n}" aria-pressed="${state.imposters===n}">${n}<span class="sub">OF 4</span></button>`).join("")}
      </div>
      <p class="note" id="impNote"></p>
    </div>

    <div class="panel">
      <label class="label eyebrow" for="cat">Category</label>
      <select id="cat">${opts}</select>
    </div>

    <button class="btn btn-gold" id="deal">Deal the cards</button>
    <p class="error" id="err"></p>
    <p class="note">One phone, passed around. Each agent taps to see their secret word — imposters get only a hint and have to bluff.</p>
  `;

  const impNote = document.getElementById("impNote");
  const setImpNote = ()=> impNote.textContent =
    state.imposters===1 ? "Classic. One liar at the table." :
    state.imposters===2 ? "Two liars — they don't know each other." :
    "Three liars vs one. Chaos.";
  setImpNote();

  [0,1,2,3].forEach(i=>{
    document.getElementById("p"+i).addEventListener("input", e=> state.players[i]=e.target.value);
  });
  document.getElementById("seg").querySelectorAll("button").forEach(b=>{
    b.addEventListener("click", ()=>{
      state.imposters = +b.dataset.n;
      document.getElementById("seg").querySelectorAll("button").forEach(x=>x.setAttribute("aria-pressed", x===b));
      setImpNote();
    });
  });
  document.getElementById("cat").addEventListener("change", e=> state.category=e.target.value);
  document.getElementById("deal").addEventListener("click", ()=>{
    document.getElementById("err").textContent = "";
    startRound();
  });
}

/* ---------------- HANDOFF + REVEAL CARD ---------------- */
function renderHandoff(){
  const i = state.idx;
  const isImp = state.impSet.has(i);

  const back = isImp ? `
    <div class="face face-back imp">
      <span class="role-tag">No clearance</span>
      <div class="role-headline">You're the imposter</div>
      <div class="cat-line">Category · ${esc(state.catName)}</div>
      <div class="hint-block">
        <div class="hint-label">— the word, redacted —</div>
        <div class="redactions"><span></span><span></span><span></span></div>
        <div class="hint-label">your only hint</div>
        <div class="hint-text">${esc(state.hint)}</div>
      </div>
      <p class="role-foot">Everyone else knows the real word. Blend in, work out what it is, and don't get voted out.</p>
    </div>` : `
    <div class="face face-back crew">
      <span class="role-tag">Clearance granted</span>
      <div class="cat-line">Category · ${esc(state.catName)}</div>
      <div class="word">${esc(state.word)}</div>
      <p class="role-foot">This is the secret word. There ${state.imposters===1?"is 1 imposter":"are "+state.imposters+" imposters"} at the table who don't know it — flush them out.</p>
    </div>`;

  app.innerHTML = `
    <div class="handoff-top">
      <span class="counter">AGENT ${i+1} / ${PLAYER_COUNT}</span>
      <div class="progress">${[0,1,2,3].map(k=>`<span class="pip ${k<i?'done':k===i?'active':''}"></span>`).join("")}</div>
    </div>

    <div class="passto">
      <p class="eyebrow">Pass the phone to</p>
      <div class="who">${esc(playerName(i))}</div>
    </div>

    <div class="card" id="card">
      <div class="card-inner">
        <div class="face face-front">
          <span class="classified">CLASSIFIED · EYES ONLY</span>
          <div class="seal">TAP<br>TO<br>OPEN</div>
          <div class="lead">${esc(playerName(i))}'s card</div>
          <div class="tap-hint">make sure nobody's peeking</div>
        </div>
        ${back}
      </div>
    </div>

    <div id="afterReveal"></div>
    <div class="spacer"></div>
    <p class="note" style="text-align:center">${state.flipped ? "Memorise it, then hide and pass along." : "Only "+esc(playerName(i))+" should look."}</p>
  `;

  const card = document.getElementById("card");
  const after = document.getElementById("afterReveal");

  function showHideButton(){
    const last = i === PLAYER_COUNT-1;
    after.innerHTML = `<button class="btn ${last?'btn-gold':'btn-ghost'}" id="hide">${last?'Everyone has seen it →':'Hide & pass on →'}</button>`;
    document.getElementById("hide").addEventListener("click", ev=>{
      ev.stopPropagation();
      if(last){ state.screen="discuss"; render(); }
      else { state.idx++; state.flipped=false; render(); }
    });
  }

  if(state.flipped){ card.classList.add("flipped"); showHideButton(); }

  card.addEventListener("click", ()=>{
    if(state.flipped) return;
    state.flipped = true;
    card.classList.add("flipped");
    document.querySelector(".note").textContent = "Memorise it, then hide and pass along.";
    showHideButton();
  });
}

/* ---------------- RESULTS ---------------- */
function renderDiscuss(){
  const impNames = [...state.impSet].sort().map(playerName).join(", ");

  app.innerHTML = `
    <header class="masthead">
      <div class="tag"><span class="eyebrow">Round in progress</span><span class="stamp-file">${esc(state.catName)}</span></div>
    </header>

    <div class="discuss-head">
      <p class="eyebrow">Cards dealt</p>
      <div class="display">Now find them</div>
    </div>
    <p class="instructions">Talk it out. Take turns dropping a word or clue tied to the secret. The imposter is bluffing — too vague or too far off gives them away. Then vote on who the imposter is.</p>

    <div id="answerArea">
      ${state.answerShown ? `
        <div class="reveal-box">
          <p class="eyebrow">The secret word was</p>
          <div class="word">${esc(state.word)}</div>
          <p class="eyebrow">Imposter${state.imposters>1?'s':''}</p>
          <div class="imps">${esc(impNames)}</div>
        </div>` : `<button class="btn btn-ghost" id="revealBtn">Reveal the answer</button>`}
    </div>

    <div class="spacer"></div>
    <div class="btn-row">
      <button class="btn btn-gold" id="next">Next round</button>
      <button class="btn btn-ghost" id="newgame">New game</button>
    </div>
  `;

  if(!state.answerShown){
    document.getElementById("revealBtn").addEventListener("click", ()=>{ state.answerShown=true; render(); });
  }
  document.getElementById("next").addEventListener("click", startRound);
  document.getElementById("newgame").addEventListener("click", ()=>{ state.screen="setup"; render(); });
}

/* ---------------- ROUTER ---------------- */
function render(){
  window.scrollTo(0,0);
  if(state.screen==="setup") renderSetup();
  else if(state.screen==="handoff") renderHandoff();
  else renderDiscuss();
}

render();
</script>
</body>
</html>
